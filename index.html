<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKZW Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="top">
    <div class="header-container">
        <div class="logo">
            <h1>BLACK SHOP</h1>
            <span class="tagline">KITS | ITENS | SERVIÇOS | 100% GRÁTIS</span>
        </div>
    </div>
</header>

<!-- MAIN -->
<main>

<section class="section">
    <h2 class="section-title"> KITS</h2>
    <div class="grid" id="kitsGrid"></div>
</section>

<section class="section">
    <h2 class="section-title"> ITENS</h2>
    <div class="grid" id="itensGrid"></div>
</section>

<section class="section">
    <h2 class="section-title"> SERVIÇOS</h2>
    <div class="grid" id="servicosGrid"></div>
</section>

</main>

<!-- MODAL DO CARRINHO -->
<div id="cartModal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2>🛒 SEU CARRINHO</h2>
            <span class="close">&times;</span>
        </div>

        <div class="modal-body">
            <div id="cartItems"></div>

            <div class="cart-total">
                <strong>Total: R$ <span id="cartTotal">0.00</span></strong>
            </div>
        </div>

        <div class="modal-footer">
            <button class="checkout-btn" onclick="finalizarCompra()">
                Finalizar Compra
            </button>
        </div>

    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- SCRIPTS -->
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
