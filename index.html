<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK SHOP | A MELHOR LOJA DE ITENS GRÁTIS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top">
        <div class="header-container">
            <div class="logo">
                <h1>BLACK SHOP</h1>
                <span class="tagline">KITS | ITENS | SERVIÇOS | 100% GRÁTIS</span>
            </div>

            <div class="search-area">
                <input type="text" id="search" placeholder="🔍 Buscar produtos...">
            </div>
        </div>
    </header>

    <nav class="categories">
        <div class="categories-container">
            <button class="category-btn active" data-category="all">Tudo</button>
            <button class="category-btn" data-category="kits">Kits</button>
            <button class="category-btn" data-category="itens">Itens</button>
            <button class="category-btn" data-category="servicos">Serviços</button>
        </div>
    </nav>

    <main>
        <section class="section" id="section-kits">
            <h2 class="section-title"> KITS EXCLUSIVOS</h2>
            <div class="grid" id="kitsGrid"></div>
        </section>

        <section class="section" id="section-itens">
            <h2 class="section-title"> ITENS RAROS</h2>
            <div class="grid" id="itensGrid"></div>
        </section>

        <section class="section" id="section-servicos">
            <h2 class="section-title"> SERVIÇOS PRO</h2>
            <div class="grid" id="servicosGrid"></div>
        </section>
    </main>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 SEU CARRINHO</h2>
                <span class="close" onclick="fecharCarrinho()">&times;</span>
            </div>

            <div class="modal-body">
                <div id="cartItems">
                    <p style="color:#666; text-align:center;">Seu carrinho está vazio.</p>
                </div>

                <div class="cart-total">
                    <strong>Total: <span id="cartTotal">R$ 0.00</span></strong>
                </div>
            </div>

            <div class="modal-footer">
                <button class="checkout-btn" onclick="finalizarCompra()">
                    Finalizar Compra via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Produto adicionado! ✅</div>

    <script src="data.js"></script>
    <script src="script.js"></script>

<div class="cart-icon-container" onclick="abrirCarrinho()" style="cursor:pointer; position:relative;">
    <span style="font-size: 24px;">🛒</span>
    <span id="cart-count" style="position:absolute; top:-5px; right:-10px; background:white; color:black; border-radius:50%; padding:2px 6px; font-size:10px; font-weight:bold;">0</span>
</div>


</body>
</html>
