<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKZW Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>🛒 BLACKZW</h2>

    <input type="text" id="search" placeholder="Buscar produtos...">

    <div class="nav-links">
        <a href="#">Início</a>
        <a href="#">Loja</a>
        <a href="#">Suporte</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>A melhor loja digital 🔥</h1>
    <p>Itens exclusivos, entrega rápida e preço baixo</p>
    <button onclick="document.getElementById('grid').scrollIntoView({behavior:'smooth'})">
        Ver Produtos
    </button>
</section>

<!-- DESTAQUE -->
<section class="destaque">
    <h2>🔥 Mais vendidos</h2>

    <div class="highlight-grid">
        <div class="card">
            <h3>VIP Premium</h3>
            <p>O mais comprado 💎</p>
        </div>

        <div class="card">
            <h3>Boost XP</h3>
            <p>Suba de nível rápido 🚀</p>
        </div>
    </div>
</section>

<!-- PRODUTOS -->
<section class="produtos">
    <h2>🛍️ Produtos</h2>
    <div class="grid" id="grid"></div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 BLACKZW Store - Todos os direitos reservados</p>
</footer>

<script src="script.js"></script>

</body>
</html>
