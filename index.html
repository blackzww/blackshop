<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKZW Store PRO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🛒 BLACKZW STORE</h1>
    <input type="text" id="search" placeholder="Buscar item...">
</header>

<main class="grid" id="grid">

<div class="card" data-name="vip premium">
    <h3>VIP Premium</h3>
    <p>Acesso exclusivo 🔥</p>
    <button onclick="comprar()">Comprar</button>
    <div class="info">Info: Entrega imediata</div>
</div>

<div class="card" data-name="boost xp">
    <h3>Boost XP</h3>
    <p>Ganhe mais XP 🚀</p>
    <button onclick="comprar()">Comprar</button>
    <div class="info">Info: Duração 24h</div>
</div>

<div class="card" data-name="item raro">
    <h3>Item Raro</h3>
    <p>Item exclusivo 💎</p>
    <button onclick="comprar()">Comprar</button>
    <div class="info">Info: Estoque limitado</div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
