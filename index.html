<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKZW Store - Kits | Itens | Serviços</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
    <div class="header-container">
        <div class="logo">
            <h1>⚡ BLACKZW STORE</h1>
            <span class="tagline">Kits | Itens | Serviços</span>
        </div>
        
        <div class="search-area">
            <input type="text" id="search" placeholder="Buscar produtos...">
            <button class="search-btn">🔍</button>
        </div>
        
        <div class="header-actions">
            <div class="cart-icon" id="cartIcon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="user-icon">👤</div>
        </div>
    </div>
</header>

<!-- Categorias -->
<nav class="categories">
    <div class="categories-container">
        <button class="category-btn active" data-category="all">📦 Todos</button>
        <button class="category-btn" data-category="kits">🎁 KITS</button>
        <button class="category-btn" data-category="itens">⚔️ ITENS</button>
        <button class="category-btn" data-category="servicos">🛠️ SERVIÇOS</button>
    </div>
</nav>

<!-- PRODUTOS DINÂMICOS -->
<main class="grid" id="grid"></main>

<!-- Modal do Carrinho -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🛒 Seu Carrinho</h2>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <div id="cartItems"></div>
            <div class="cart-total">
                <strong>Total: R$ <span id="cartTotal">0.00</span></strong>
            </div>
        </div>
        <div class="modal-footer">
            <button class="checkout-btn" onclick="finalizarCompra()">Finalizar Compra</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- ORDEM IMPORTANTE -->
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
